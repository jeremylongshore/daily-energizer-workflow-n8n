name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Validate workflow before release
      run: |
        echo "🔍 Validating workflow files before release..."

        if [ -f "The Daily Energizer Article and Image Generator V4.json" ]; then
          jq empty "The Daily Energizer Article and Image Generator V4.json"
          echo "✅ V4 workflow JSON is valid"
        fi

        if [ -f "The Daily Energizer Article and Image Generator V3.json" ]; then
          jq empty "The Daily Energizer Article and Image Generator V3.json"
          echo "✅ V3 workflow JSON is valid"
        fi

    - name: Generate workflow statistics
      run: |
        echo "📊 Generating workflow statistics for release..."

        if [ -f "The Daily Energizer Article and Image Generator V4.json" ]; then
          V4_NODES=$(jq '.nodes | length' "The Daily Energizer Article and Image Generator V4.json")
          V4_SIZE=$(ls -lh "The Daily Energizer Article and Image Generator V4.json" | awk '{print $5}')
          echo "V4_NODES=$V4_NODES" >> $GITHUB_ENV
          echo "V4_SIZE=$V4_SIZE" >> $GITHUB_ENV
        fi

        if [ -f "The Daily Energizer Article and Image Generator V3.json" ]; then
          V3_NODES=$(jq '.nodes | length' "The Daily Energizer Article and Image Generator V3.json")
          V3_SIZE=$(ls -lh "The Daily Energizer Article and Image Generator V3.json" | awk '{print $5}')
          echo "V3_NODES=$V3_NODES" >> $GITHUB_ENV
          echo "V3_SIZE=$V3_SIZE" >> $GITHUB_ENV
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        files: |
          The Daily Energizer Article and Image Generator V*.json
          CLAUDE.md
          FEATURE-UPDATES-SUMMARY.md
          MANUAL-UPDATE-GUIDE.md
        body: |
          ## 🚀 Daily Energizer Workflow Release

          ### 📊 Workflow Statistics
          - **V4 Workflow**: ${{ env.V4_NODES }} nodes, ${{ env.V4_SIZE }}
          - **V3 Workflow**: ${{ env.V3_NODES }} nodes, ${{ env.V3_SIZE }}

          ### 🛡️ Anti-Hallucination System
          - ✅ 4-layer protection system
          - ✅ Temperature zero for deterministic output
          - ✅ Story verification against source feeds
          - ✅ 48-hour freshness filtering

          ### 📚 Documentation Included
          - Complete implementation guide
          - Feature updates summary
          - Manual configuration procedures
          - Claude Code development guidance

          ### 🚀 Quick Start
          ```bash
          # Import latest workflow
          n8n import:workflow --input="The Daily Energizer Article and Image Generator V4.json"
          ```

          **Built with ❤️ for positive news automation**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-badges:
    name: Update Repository Badges
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Update README badges
      run: |
        echo "🏷️ Repository badges are automatically updated by GitHub"
        echo "✅ Release badge will reflect new version"
        echo "✅ Workflow status badges active"